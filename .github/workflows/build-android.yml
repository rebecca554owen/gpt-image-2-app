name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Setup keystore
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/gptimage.keystore
          fi

          cat > android/keystore.properties << PROPS
          storePassword=${KEYSTORE_PASSWORD:-gptimage123}
          keyAlias=${KEYSTORE_ALIAS:-gptimage}
          keyPassword=${KEYSTORE_KEY_PASSWORD:-gptimage123}
          PROPS
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Auto version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          BASE=$(node -p "const v=require('./package.json').version.split('.'); v[0]+'.'+v[1]")
          VERSION="${BASE}.${COMMIT_COUNT}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
          echo "Updated package.json version to $VERSION"

      - name: Build web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk gpt-image-2-app-v${{ steps.version.outputs.VERSION }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## 更新内容

            自动构建于 ${{ github.sha }}

            > 提交：${{ github.event.head_commit.message }}
          files: gpt-image-2-app-v${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: false

      - name: Upload Artifact (backup)
        uses: actions/upload-artifact@v7
        with:
          name: gpt-image-2-app-v${{ steps.version.outputs.VERSION }}
          path: gpt-image-2-app-v${{ steps.version.outputs.VERSION }}.apk
